<div class="medicine-form-container">
  <div class="header-title">
    <!-- <div class="form-header-top"> -->
      <div class="form-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M10.5 20.5l10-10a4.95 4.95 0 1 0-7-7l-10 10a4.95 4.95 0 1 0 7 7Z"/>
          <line x1="8.5" y1="8.5" x2="15.5" y2="15.5"/>
        </svg>
      </div>
      <h2>{{ formTitle }}</h2>
    <!-- </div> -->
    <p>Add or update your medication details</p>
    <button class="dashboard-btn" (click)="goToDashboard()">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="7" height="7"/>
        <rect x="14" y="3" width="7" height="7"/>
        <rect x="14" y="14" width="7" height="7"/>
        <rect x="3" y="14" width="7" height="7"/>
      </svg>
      <span>Dashboard</span>
    </button>
  </div>

  <form class="reg-form" [formGroup]="addPill" (ngSubmit)="onSubmit()">
    

    <div class="form-group">
      <label for="pillName">Pill Name</label>
      <input type="text" name="name" required formControlName="pillName" placeholder="Enter pill name">
    </div>
    <p *ngIf="isFormControlError('pillName')" class="errors">Pill name required</p>

    <div class="form-group">
      <label for="startDate">Start Date</label>
      <input type="date" name="startDate" required formControlName="startDate">
    </div>
    <p *ngIf="isFormControlError('startDate')" class="errors">Start date required</p>

    <div class="form-group">
      <label for="endDate">End Date</label>
      <input type="date" name="endDate" required formControlName="endDate">
    </div>
    <p *ngIf="isFormControlError('endDate')" class="errors">End date required</p>

    <div class="form-group">
      <label for="frequency">Frequency</label>
      <select name="frequency" formControlName="frequency">
        <option value="Daily">Daily</option>
        <option value="Alternatively">Alternatively</option>
      </select>
    </div>
    <p *ngIf="isFormControlError('frequency')" class="errors">Frequency required</p>

    <div class="form-group">
      <label for="timing">Timing</label>
      <input type="time" name="timing" required formControlName="timing">
    </div>
    <p *ngIf="isFormControlError('timing')" class="errors">Timing required</p>

    <div class="form-group">
      <label for="beforeAfterMeal">Before/After Meal</label>
      <select name="beforeOrAfterMeal" formControlName="beforeAfterMeal">
        <option value="Before">Before</option>
        <option value="After">After</option>
      </select>
    </div>
    <p *ngIf="isFormControlError('beforeAfterMeal')" class="errors">Before or After Meal information required</p>

    <div class="form-group">
      <label for="quantityYouHave">Quantity You Have</label>
      <input type="text" name="quantityYouHave" required formControlName="quantityYouHave" placeholder="Enter quantity">
    </div>
    <p *ngIf="isFormControlError('quantityYouHave')" class="errors">Quantity you have required</p>

    <div class="form-group">
      <label for="description">Description</label>
      <input type="text" name="description" required formControlName="description" placeholder="Enter description">
    </div>
    <button type="submit" class="submit-btn" [disabled]="addPill.invalid">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="12" y1="5" x2="12" y2="19"/>
        <line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
      <span>{{ buttonText }}</span>
    </button>
  </form>
</div>
