<div class="medicine-stock-container">
  <div class="header">
    <div class="header-content">
      <div class="header-title">
        <div class="header-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
            <polyline points="3.27 6.96 12 12.01 20.73 6.96"/>
            <line x1="12" y1="22.08" x2="12" y2="12"/>
          </svg>
        </div>
        <h1>Medicine Stock</h1>
      </div>
      <button class="dashboard-btn" (click)="goToDashboard()">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="7"/>
          <rect x="14" y="3" width="7" height="7"/>
          <rect x="14" y="14" width="7" height="7"/>
          <rect x="3" y="14" width="7" height="7"/>
        </svg>
        <span>Dashboard</span>
      </button>
    </div>
  </div>

  <div class="stock-list">
    <div *ngFor="let med of medicineCalendars" class="medicine-stock-card">
      <div class="medicine-stock-header">
        <div class="medicine-stock-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M10.5 20.5l10-10a4.95 4.95 0 1 0-7-7l-10 10a4.95 4.95 0 1 0 7 7Z"/>
            <line x1="8.5" y1="8.5" x2="15.5" y2="15.5"/>
          </svg>
        </div>
        <h2>{{med.pillName}}</h2>
      </div>

      <div class="calendar-container">
        <div class="column" *ngFor="let week of med.calendar">
          <div class="pill" *ngFor="let day of week" [class.filled]="day.isFilled">
            <div class="day">{{ day.day }}</div>
            <div class="date">{{ day.date }}</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
