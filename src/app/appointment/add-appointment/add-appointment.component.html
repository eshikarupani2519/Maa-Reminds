<div class="container mt-4">
  <h2>{{ isEditMode ? 'Edit Appointment' : 'Add New Appointment' }}</h2>
  <form [formGroup]="addAppointmentForm" (ngSubmit)="onSubmit()">
    <div class="form-group">
      <label for="doctorName">Doctor's Name</label>
      <input type="text" id="doctorName" formControlName="doctorName" class="form-control" required>
    </div>
    <div class="form-group">
      <label for="date">Date</label>
      <input type="date" id="date" formControlName="date" class="form-control" required>
    </div>
    <div class="form-group">
      <label for="time">Time</label>
      <input type="time" id="time" formControlName="time" class="form-control" required>
    </div>
    <div class="form-group">
      <label for="notes">Notes</label>
      <textarea id="notes" formControlName="notes" class="form-control"></textarea>
    </div>
    <button type="submit" class="btn btn-primary" [disabled]="!addAppointmentForm.valid">
      {{ isEditMode ? 'Update' : 'Add' }} Appointment
    </button>
  </form>
</div>
