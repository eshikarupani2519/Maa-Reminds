<div class="appointment-form-container">
  <div class="form-header">
    <!-- <div class="form-header-top"> -->
      <div class="form-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
          <line x1="16" y1="2" x2="16" y2="6"/>
          <line x1="8" y1="2" x2="8" y2="6"/>
          <line x1="3" y1="10" x2="21" y2="10"/>
        </svg>
      </div>
      <h2>{{ isEditMode ? 'Edit Appointment' : 'Add New Appointment' }}</h2>
    <!-- </div> -->
    <p>{{ isEditMode ? 'Update your appointment details' : 'Schedule a new appointment' }}</p>
    <button class="dashboard-btn" (click)="goToDashboard()">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="7" height="7"/>
        <rect x="14" y="3" width="7" height="7"/>
        <rect x="14" y="14" width="7" height="7"/>
        <rect x="3" y="14" width="7" height="7"/>
      </svg>
      <span>Dashboard</span>
    </button>
  </div>

  <form [formGroup]="addAppointmentForm" (ngSubmit)="onSubmit()">
   

    <div class="form-group">
      <label for="doctorName">Doctor's Name</label>
      <input type="text" id="doctorName" formControlName="doctorName" class="form-control" placeholder="Enter doctor's name" required>
    </div>
    <div class="form-group">
      <label for="date">Date</label>
      <input type="date" id="date" formControlName="date" class="form-control" required>
    </div>
    <div class="form-group">
      <label for="time">Time</label>
      <input type="time" id="time" formControlName="time" class="form-control" required>
    </div>
    <div class="form-group">
      <label for="notes">Notes</label>
      <textarea id="notes" formControlName="notes" class="form-control" placeholder="Add any notes or instructions" rows="3"></textarea>
    </div>
     <button type="submit" class="submit-btn" [disabled]="!addAppointmentForm.valid">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="12" y1="5" x2="12" y2="19"/>
        <line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
      <span>{{ isEditMode ? 'Update' : 'Add' }} Appointment</span>
    </button>
  </form>
</div>
