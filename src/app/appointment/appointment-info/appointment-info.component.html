<div *ngIf="appointment">
  <h2>Appointment Details</h2>
  <p><strong>Doctor:</strong> {{ appointment.doctorName }}</p>
  <p><strong>Date:</strong> {{ appointment.date | date }}</p>
  <p><strong>Time:</strong> {{ appointment.time }}</p>
  <p><strong>Notes:</strong> {{ appointment.notes }}</p>
  <div>
    <button (click)="editAppointment(appointment._id)" class="btn btn-primary">Edit</button>
    <button (click)="deleteAppointment(appointment._id)" class="btn btn-danger">Delete</button>
  </div>
</div>
<div *ngIf="!appointment">
  <p>Loading appointment information...</p>
</div>
