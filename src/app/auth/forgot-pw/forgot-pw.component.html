<div class="forgot-password-container">

  <form [formGroup]="forgotPWForm"
        class="login-form"
        (ngSubmit)="submitForm()">

    <h2 class="form-title">Reset Password</h2>

    <!-- New Password -->
    <div class="label-input">
      <label>New Password</label>
      <input type="password"
             placeholder="Enter new password"
             formControlName="newPassword" />
    </div>

    <p *ngIf="forgotPWForm.get('newPassword')?.invalid 
              && forgotPWForm.get('newPassword')?.touched"
       class="errors">
       Password must be at least 6 characters
    </p>

    <!-- Confirm Password -->
    <div class="label-input">
      <label>Confirm Password</label>
      <input type="password"
             placeholder="Confirm new password"
             formControlName="confirmPassword" />
    </div>

    <p *ngIf="!passwordsMatch() 
              && forgotPWForm.get('confirmPassword')?.touched"
       class="errors">
       Passwords do not match
    </p>

    <button type="submit"
            [disabled]="forgotPWForm.invalid || !passwordsMatch()">
      Reset Password
    </button>

  </form>

</div>
